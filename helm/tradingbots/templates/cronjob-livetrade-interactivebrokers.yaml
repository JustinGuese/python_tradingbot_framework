{{- if .Values.liveTradeIB.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: livetrade-ib
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace }}
spec:
  schedule: {{ $.Values.liveTradeIB.schedule | quote }}
  successfulJobsHistoryLimit: {{ $.Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $.Values.cronjob.failedJobsHistoryLimit }}
  concurrencyPolicy: {{ $.Values.cronjob.concurrencyPolicy }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $.Values.cronjob.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: {{ $.Values.cronjob.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            ib-gateway-client: "true"  # required by ibgateway-allow-clients NetworkPolicy
        spec:
          imagePullSecrets:
          {{- range $.Values.imagePullSecrets }}
          - name: {{ .name }}
          {{- end }}
          containers:
          - name: livetrade-ib
            image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
            command:
            - "python"
            args:
            - "livetrade_interactive_brokers.py"
            imagePullPolicy: {{ $.Values.image.pullPolicy }}
            resources:
              {{- toYaml $.Values.resources | nindent 14 }}
            env:
            {{- if $.Values.postgresql.clusterConnection }}
            - name: POSTGRES_HOST
              value: {{ $.Values.postgresql.clusterConnection.host | quote }}
            - name: POSTGRES_PORT
              value: {{ $.Values.postgresql.clusterConnection.port | quote }}
            - name: POSTGRES_USER
              value: {{ $.Values.postgresql.clusterConnection.user | quote }}
            - name: POSTGRES_DATABASE
              value: {{ $.Values.postgresql.clusterConnection.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            {{- range $.Values.env }}
            {{- if and $.Values.postgresql.clusterConnection (or (eq .name "POSTGRES_URI") (eq .name "POSTGRES_PASSWORD")) }}
            {{- else }}
            - name: {{ .name }}
            {{- if .value }}
              value: {{ .value | quote }}
            {{- else if .valueFrom }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: {{ .valueFrom.secretKeyRef.key }}
            {{- end }}
            {{- end }}
            {{- end }}
            # IB credentials (from secret or values)
            - name: IB_GATEWAY_HOST
              value: {{ $.Values.liveTradeIB.host | quote }}
            - name: IB_GATEWAY_PORT
              value: {{ $.Values.liveTradeIB.port | quote }}
            - name: IB_CLIENT_ID
              value: {{ $.Values.liveTradeIB.clientId | quote }}
            - name: IB_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: IB_ACCOUNT_ID
            # LiveTrade configuration (from values.yaml)
            - name: LIVETRADE_BOT_WEIGHTS
              value: {{ $.Values.liveTradeIB.botWeights | quote }}
            - name: LIVETRADE_MIN_ORDER_USD
              value: {{ $.Values.liveTradeIB.minOrderUsd | quote }}
            - name: LIVETRADE_DRY_RUN
              value: {{ $.Values.liveTradeIB.dryRun | quote }}
            - name: LIVETRADE_STRICT_MAPPING
              value: {{ $.Values.liveTradeIB.strictMapping | quote }}
            - name: LIVETRADE_PORTFOLIO_FRACTION
              value: {{ $.Values.liveTradeIB.portfolioFraction | quote }}
          restartPolicy: OnFailure
{{- end }}
