{{- if .Values.liveTrade.darwinex.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: livetrade-darwinex
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace }}
spec:
  schedule: {{ $.Values.liveTrade.darwinex.schedule | quote }}
  successfulJobsHistoryLimit: {{ $.Values.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $.Values.cronjob.failedJobsHistoryLimit }}
  concurrencyPolicy: {{ $.Values.cronjob.concurrencyPolicy }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $.Values.cronjob.activeDeadlineSeconds }}
      ttlSecondsAfterFinished: {{ $.Values.cronjob.ttlSecondsAfterFinished }}
      template:
        spec:
          imagePullSecrets:
          {{- range $.Values.imagePullSecrets }}
          - name: {{ .name }}
          {{- end }}
          containers:
          - name: livetrade-darwinex
            image: {{ $.Values.image.repository }}:{{ $.Values.image.tag }}
            command:
            - "python"
            args:
            - "livetrade_darwinex.py"
            imagePullPolicy: {{ $.Values.image.pullPolicy }}
            resources:
              {{- toYaml $.Values.resources | nindent 14 }}
            env:
            {{- if $.Values.postgresql.clusterConnection }}
            - name: POSTGRES_HOST
              value: {{ $.Values.postgresql.clusterConnection.host | quote }}
            - name: POSTGRES_PORT
              value: {{ $.Values.postgresql.clusterConnection.port | quote }}
            - name: POSTGRES_USER
              value: {{ $.Values.postgresql.clusterConnection.user | quote }}
            - name: POSTGRES_DATABASE
              value: {{ $.Values.postgresql.clusterConnection.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            {{- range $.Values.env }}
            {{- if and $.Values.postgresql.clusterConnection (or (eq .name "POSTGRES_URI") (eq .name "POSTGRES_PASSWORD")) }}
            {{- else }}
            - name: {{ .name }}
            {{- if .value }}
              value: {{ .value | quote }}
            {{- else if .valueFrom }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: {{ .valueFrom.secretKeyRef.key }}
            {{- end }}
            {{- end }}
            {{- end }}
            # Darwinex credentials (from secret)
            - name: DARWINEX_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: DARWINEX_USERNAME
            - name: DARWINEX_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretName }}
                  key: DARWINEX_PASSWORD
            - name: DARWINEX_ACCOUNT_ID
              value: {{ $.Values.liveTrade.darwinex.accountId | default "" | quote }}
            - name: DARWINEX_DEMO
              value: {{ $.Values.liveTrade.darwinex.demo | quote }}
            # LiveTrade configuration (from values.yaml)
            - name: LIVETRADE_BOT_WEIGHTS
              value: {{ $.Values.liveTrade.botWeights | quote }}
            - name: LIVETRADE_MIN_ORDER_USD
              value: {{ $.Values.liveTrade.minOrderUsd | quote }}
            - name: LIVETRADE_DRY_RUN
              value: {{ $.Values.liveTrade.dryRun | quote }}
            - name: LIVETRADE_PORTFOLIO_FRACTION
              value: {{ default $.Values.liveTrade.portfolioFraction $.Values.liveTrade.darwinex.portfolioFraction | quote }}
            - name: LIVETRADE_STRICT_MAPPING
              value: {{ $.Values.liveTrade.strictMapping | quote }}
          restartPolicy: OnFailure
{{- end }}
